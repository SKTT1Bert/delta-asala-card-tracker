<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Delta Force Asala Card Tracker | 三角洲阿萨拉牌盒记牌器</title>
<meta name="description" content="Delta Force Asala Card Tracker / 三角洲阿萨拉牌盒记牌器：本地优先的阿萨拉扑克牌收集记录工具，支持中英文、缺卡清单、重复牌统计、搜索筛选和导入导出。" />
<meta name="keywords" content="Delta Force, Delta Force Asala Card Tracker, Asala Card Tracker, Asala Card Case, 三角洲行动, 三角洲, 阿萨拉牌盒, 阿萨拉扑克牌, 三角洲记牌器, 三角洲牌盒收集, 扑克牌收集, card tracker, collection tracker, localStorage" />
<meta name="author" content="BertYin" />
<style>
  :root {
    --bg: #080c12;
    --panel: rgba(18, 25, 37, .94);
    --line: rgba(136, 160, 190, .2);
    --text: #eef4ff;
    --muted: #94a4ba;
    --green: #1fd074;
    --gold: #ffca5f;
    --red: #ff6868;
    --blue: #77a7ff;
    --shadow: 0 16px 48px rgba(0,0,0,.36);
    --radius: 18px;
  }

  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
    background:
      radial-gradient(circle at 18% 0%, rgba(65, 95, 160, .34), transparent 30%),
      radial-gradient(circle at 85% 8%, rgba(31, 208, 116, .16), transparent 28%),
      linear-gradient(180deg, #07101b 0%, var(--bg) 45%, #05070b 100%);
  }

  .wrap {
    width: min(1280px, 100%);
    margin: 0 auto;
    padding: 24px 16px 44px;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(10px);
    min-width: 0;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
    gap: 16px;
    align-items: stretch;
    margin-bottom: 16px;
  }

  .titlebox {
    padding: 22px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  h1 {
    margin: 0 0 8px;
    font-size: clamp(24px, 3vw, 30px);
    letter-spacing: .3px;
  }

  .subtitle {
    color: var(--muted);
    line-height: 1.65;
    max-width: 760px;
    margin: 0;
  }

  .settings {
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    align-content: start;
  }

  .settings-title {
    grid-column: 1 / -1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
  }

  .field label {
    display: block;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 6px;
  }

  input, select, button {
    border: 1px solid var(--line);
    background: rgba(8, 12, 18, .78);
    color: var(--text);
    border-radius: 12px;
    padding: 10px 12px;
    font: inherit;
    outline: none;
    min-width: 0;
  }

  input:focus, select:focus {
    border-color: rgba(119, 167, 255, .74);
    box-shadow: 0 0 0 3px rgba(119, 167, 255, .15);
  }

  select, button { cursor: pointer; }
  button { user-select: none; transition: transform .05s ease, filter .15s ease; white-space: nowrap; }
  button:hover { filter: brightness(1.14); }
  button:active { transform: scale(.98); }

  .primary {
    background: linear-gradient(135deg, #3478ff, #79aaff);
    border-color: transparent;
    font-weight: 700;
  }

  .danger {
    color: #ffd7d7;
    border-color: rgba(255, 104, 104, .46);
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 16px;
  }

  .stat {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 14px;
    box-shadow: var(--shadow);
    min-width: 0;
  }

  .stat b {
    display: block;
    font-size: 26px;
    line-height: 1;
    margin-bottom: 7px;
  }

  .stat span {
    color: var(--muted);
    font-size: 12px;
  }

  .progress {
    grid-column: 1 / -1;
    background: rgba(8, 12, 18, .72);
    border: 1px solid var(--line);
    border-radius: 999px;
    height: 13px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--green), var(--gold));
    border-radius: 999px;
    transition: width .2s ease;
  }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) minmax(120px, 150px) repeat(5, auto);
    gap: 10px;
    align-items: center;
    padding: 14px;
    margin-bottom: 16px;
  }

  .file-input {
    display: none;
  }

  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 315px);
    gap: 16px;
    align-items: start;
  }

  .card-grid-panel {
    padding: 14px;
    overflow: hidden;
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 4px 4px 12px;
  }

  .section-title h2 {
    margin: 0;
    font-size: 18px;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
  }

  .flat-note {
    margin: 0 4px 12px;
    color: var(--muted);
    font-size: 13px;
    display: none;
  }

  .special-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 14px;
  }

  .rank-row {
    display: grid;
    grid-template-columns: 58px repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 10px;
    width: 100%;
  }

  .rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold);
    font-weight: 800;
    border-radius: 14px;
    border: 1px solid rgba(255, 202, 95, .24);
    background: rgba(255, 202, 95, .08);
    min-height: 112px;
  }

  .flat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 196px), 1fr));
    gap: 10px;
    width: 100%;
  }

  .tile {
    min-height: 112px;
    min-width: 0;
    border: 1px solid var(--line);
    border-radius: 16px;
    background: linear-gradient(180deg, rgba(24, 34, 49, .96), rgba(11, 16, 24, .96));
    padding: 10px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    position: relative;
  }

  .tile.owned {
    border-color: rgba(31, 208, 116, .48);
    background:
      radial-gradient(circle at 95% 5%, rgba(31, 208, 116, .22), transparent 38%),
      linear-gradient(180deg, rgba(24, 44, 36, .98), rgba(10, 20, 16, .97));
  }

  .tile.duplicate {
    border-color: rgba(255, 202, 95, .66);
    box-shadow: inset 0 0 0 1px rgba(255, 202, 95, .24);
  }

  .tile-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .name {
    font-weight: 800;
    font-size: 15px;
    overflow-wrap: anywhere;
    min-width: 0;
  }

  .symbol {
    font-size: 25px;
    line-height: 1;
    font-weight: 900;
    opacity: .94;
    flex: 0 0 auto;
  }

  .symbol.red { color: #ff6666; }
  .symbol.black { color: #d8e5ff; }
  .symbol.joker { color: var(--gold); }
  .symbol.box { color: var(--blue); font-size: 20px; }

  .qtyline {
    display: grid;
    grid-template-columns: 1fr;
    gap: 7px;
    align-self: end;
    min-width: 0;
  }

  .qty-controls {
    display: grid;
    grid-template-columns: minmax(28px, 1fr) minmax(38px, 1.25fr) minmax(28px, 1fr);
    gap: 6px;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  .mini {
    width: 100%;
    height: 32px;
    padding: 0;
    border-radius: 10px;
    display: grid;
    place-items: center;
    font-weight: 900;
    font-size: 17px;
    line-height: 1;
  }

  .qty {
    width: 100%;
    height: 32px;
    text-align: center;
    padding: 0;
    border-radius: 10px;
  }

  .badge {
    justify-self: start;
    max-width: 100%;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 999px;
    border: 1px solid var(--line);
    color: var(--muted);
    white-space: nowrap;
    text-align: center;
  }

  .badge.ok {
    color: #bff2d4;
    border-color: rgba(31, 208, 116, .42);
    background: rgba(31, 208, 116, .12);
  }

  .badge.dup {
    color: #ffe1a0;
    border-color: rgba(255, 202, 95, .50);
    background: rgba(255, 202, 95, .12);
  }

  .side {
    display: grid;
    gap: 16px;
    min-width: 0;
  }

  .sidebox {
    padding: 16px;
    min-width: 0;
  }

  .sidebox h3 {
    margin: 0 0 10px;
    font-size: 16px;
  }

  .list {
    margin: 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 8px;
    max-height: 340px;
    overflow: auto;
  }

  .list li {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 11px;
    padding: 8px 9px;
    background: rgba(8, 12, 18, .45);
    min-width: 0;
  }

  .list li span {
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .list small {
    color: var(--muted);
    flex: 0 0 auto;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .copy {
    width: 100%;
    margin-top: 10px;
  }

  @media (max-width: 1140px) {
    .toolbar {
      grid-template-columns: minmax(0, 1fr) minmax(120px, 150px) repeat(3, auto);
    }
  }

  @media (max-width: 1080px) {
    .hero, .main {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 820px) {
    .toolbar {
      grid-template-columns: 1fr 1fr;
    }

    .toolbar input {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 760px) {
    .wrap {
      padding: 14px 10px 34px;
    }

    .settings,
    .stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .special-grid {
      grid-template-columns: 1fr;
    }

    .rank-row {
      grid-template-columns: 46px repeat(2, minmax(0, 1fr));
    }

    .rank-label {
      grid-row: span 2;
      min-height: 234px;
    }

    .flat-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 170px), 1fr));
    }
  }

  @media (max-width: 460px) {
    .settings,
    .stats,
    .toolbar {
      grid-template-columns: 1fr;
    }

    .rank-row {
      grid-template-columns: 40px 1fr;
    }

    .rank-label {
      grid-row: span 4;
      min-height: 468px;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <section class="panel titlebox">
      <h1 id="appTitle">三角洲阿萨拉牌盒记牌器</h1>
      <p id="subtitle" class="subtitle"></p>
    </section>

    <section class="panel settings">
      <div class="settings-title">
        <strong id="settingsTitle"></strong>
        <span>v1.0.0 · Author: BertYin</span>
      </div>
      <div class="field">
        <label id="orderLabel" for="orderSelect"></label>
        <select id="orderSelect" onchange="changeOrder(this.value)">
          <option value="aceHigh">A → K → Q → J → 10 → ... → 2</option>
          <option value="aceLow">A → 2 → 3 → ... → Q → K</option>
          <option value="kingHigh">K → Q → J → 10 → ... → 2 → A</option>
          <option value="lowHigh">2 → 3 → ... → K → A</option>
        </select>
      </div>
      <div class="field">
        <label id="languageLabel" for="languageSelect"></label>
        <select id="languageSelect" onchange="changeLang(this.value)">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
    </section>
  </div>

  <section class="stats">
    <div class="stat"><b id="uniqueOwned">0</b><span id="uniqueLabel"></span></div>
    <div class="stat"><b id="missingCount">0</b><span id="missingLabel"></span></div>
    <div class="stat"><b id="physicalCount">0</b><span id="physicalLabel"></span></div>
    <div class="stat"><b id="dupCount">0</b><span id="dupLabel"></span></div>
    <div class="progress"><div id="bar" class="bar"></div></div>
  </section>

  <section class="panel toolbar">
    <input id="search" oninput="render()" />
    <select id="filter" onchange="render()">
      <option value="all"></option>
      <option value="owned"></option>
      <option value="missing"></option>
      <option value="duplicate"></option>
    </select>
    <button class="primary" id="exportJsonBtn" onclick="exportJSON()"></button>
    <button id="exportCsvBtn" onclick="exportCSV()"></button>
    <button id="importBtn" onclick="document.getElementById('importFile').click()"></button>
    <input class="file-input" id="importFile" type="file" accept=".json,application/json" onchange="importJSON(event)" />
    <button id="copyMissingBtn" onclick="copyMissing()"></button>
    <button class="danger" id="resetBtn" onclick="resetProgress()"></button>
  </section>

  <div class="main">
    <section class="panel card-grid-panel">
      <div class="section-title">
        <h2 id="gridTitle"></h2>
        <span class="hint" id="legendText"></span>
      </div>
      <p id="flatNote" class="flat-note"></p>
      <div id="gridArea"></div>
    </section>

    <aside class="side">
      <section class="panel sidebox">
        <h3 id="duplicatesTitle"></h3>
        <ul class="list" id="dupList"></ul>
        <div id="dupEmpty" class="empty"></div>
      </section>

      <section class="panel sidebox">
        <h3 id="missingTitle"></h3>
        <ul class="list" id="missingList"></ul>
        <button class="copy" id="copyMissingBtn2" onclick="copyMissing()"></button>
      </section>

      <section class="panel sidebox">
        <h3 id="notesTitle"></h3>
        <div class="empty" id="notesText"></div>
      </section>
    </aside>
  </div>
</div>

let cards = JSON.parse(localStorage.getItem(STORAGE_KEYS.cards) || "null") || structuredClone(INITIAL_CARDS);
let lang = localStorage.getItem(STORAGE_KEYS.lang) || "zh";
let rankOrder = localStorage.getItem(STORAGE_KEYS.order) || "aceHigh";

function t(key) { return I18N[lang][key]; }
function save() { localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(cards)); }
function saveSettings() {
  localStorage.setItem(STORAGE_KEYS.lang, lang);
  localStorage.setItem(STORAGE_KEYS.order, rankOrder);
}

function displayName(card) {
  if (lang === "zh") return card.zh;
  if (card.id === "case") return "Card Case";
  return card.en;
}

function cardById(id) { return cards.find(c => c.id === id); }
function cardBySuitRank(suitZh, rank) { return cards.find(c => c.suitZh === suitZh && c.rank === rank); }

function setQty(id, value) {
  const card = cardById(id);
  if (!card) return;
  card.quantity = Math.max(0, parseInt(value || "0", 10));
  save();
  render();
}

function inc(id, delta) {
  const card = cardById(id);
  if (!card) return;
  card.quantity = Math.max(0, Number(card.quantity || 0) + delta);
  save();
  render();
}

function cardTile(card) {
  const owned = card.quantity > 0;
  const duplicate = card.quantity > 1;
  const badge = duplicate
    ? `<span class="badge dup">${t("duplicate")} ×${card.quantity}</span>`
    : owned
      ? `<span class="badge ok">${t("owned")}</span>`
      : `<span class="badge">${t("notOwned")}</span>`;

  return `
    <div class="tile ${owned ? "owned" : ""} ${duplicate ? "duplicate" : ""}" data-id="${card.id}">
      <div class="tile-top">
        <div class="name">${displayName(card)}</div>
        <div class="symbol ${card.color}">${card.symbol}</div>
      </div>
      <div></div>
      <div class="qtyline">
        ${badge}
        <div class="qty-controls">
          <button class="mini" onclick="inc('${card.id}', -1)" aria-label="decrease">−</button>
          <input class="qty" value="${card.quantity}" inputmode="numeric" onchange="setQty('${card.id}', this.value)" aria-label="quantity" />
          <button class="mini" onclick="inc('${card.id}', 1)" aria-label="increase">+</button>
        </div>
      </div>
    </div>
  `;
}

function normalizedText(card) {
  return [card.zh, card.en, card.rank, card.suitZh, card.suitEn, displayName(card)]
    .join(" ")
    .toLowerCase();
}

function matches(card, q, filter) {
  const hit = !q || normalizedText(card).includes(q);
  if (!hit) return false;
  if (filter === "owned") return card.quantity > 0;
  if (filter === "missing") return card.quantity === 0;
  if (filter === "duplicate") return card.quantity > 1;
  return true;
}

function orderedCardsForFlat(q, filter) {
  const specialsFirst = [cardById("joker_big"), cardById("joker_small")].filter(Boolean);
  const suitOrder = ["黑桃", "红桃", "梅花", "方片"];
  const orderedRegular = [];
  for (const rank of RANK_ORDERS[rankOrder]) {
    for (const suitZh of suitOrder) {
      const c = cardBySuitRank(suitZh, rank);
      if (c) orderedRegular.push(c);
    }
  }
  const caseCard = cardById("case");
  return [...specialsFirst, ...orderedRegular, caseCard].filter(c => c && matches(c, q, filter));
}

function buildGrid(q, filter) {
  const area = document.getElementById("gridArea");
  const normalMode = !q && filter === "all";

  if (!normalMode) {
    const result = orderedCardsForFlat(q, filter);
    area.innerHTML = `<div class="flat-grid">${result.map(cardTile).join("") || '<div class="empty">' + t("noMatch") + '</div>'}</div>`;
    document.getElementById("flatNote").style.display = "block";
    return;
  }

  const specialHtml = `<div class="special-grid">${["joker_big", "joker_small", "case"].map(id => cardTile(cardById(id))).join("")}</div>`;
  const suitOrder = ["黑桃", "红桃", "梅花", "方片"];
  const rowsHtml = RANK_ORDERS[rankOrder].map(rank => {
    const rowCards = suitOrder.map(suitZh => cardBySuitRank(suitZh, rank));
    return `
      <div class="rank-row">
        <div class="rank-label">${rank}</div>
        ${rowCards.map(cardTile).join("")}
      </div>
    `;
  }).join("");
  area.innerHTML = specialHtml + rowsHtml;
  document.getElementById("flatNote").style.display = "none";
}

function updateStats() {
  const uniqueOwned = cards.filter(c => c.quantity > 0).length;
  const missing = 55 - uniqueOwned;
  const physical = cards.reduce((s, c) => s + Number(c.quantity || 0), 0);
  const dup = cards.reduce((s, c) => s + Math.max(0, Number(c.quantity || 0) - 1), 0);
  const pct = Math.round(uniqueOwned / 55 * 100);

  document.getElementById("uniqueOwned").textContent = uniqueOwned;
  document.getElementById("missingCount").textContent = missing;
  document.getElementById("physicalCount").textContent = physical;
  document.getElementById("dupCount").textContent = dup;
  document.getElementById("bar").style.width = pct + "%";
}

function updateSideLists() {
  const dupList = document.getElementById("dupList");
  const dupCards = cards.filter(c => c.quantity > 1);
  dupList.innerHTML = dupCards.map(c => `<li><span>${displayName(c)}</span><small>×${c.quantity}</small></li>`).join("");
  document.getElementById("dupEmpty").style.display = dupCards.length ? "none" : "block";

  const missingList = document.getElementById("missingList");
  const missing = orderedCardsForFlat("", "missing");
  missingList.innerHTML = missing.map(c => `<li><span>${displayName(c)}</span><small>${t("miss")}</small></li>`).join("");
}

  document.getElementById("gridTitle").textContent = t("grid");
  document.getElementById("legendText").textContent = t("legend");
  document.getElementById("flatNote").textContent = t("flatNote");
  document.getElementById("duplicatesTitle").textContent = t("duplicateCards");
  document.getElementById("dupEmpty").textContent = t("noDuplicate");
  document.getElementById("missingTitle").textContent = t("missingCards");
  document.getElementById("copyMissingBtn2").textContent = t("copyMissing");
  document.getElementById("notesTitle").textContent = t("notes");
  document.getElementById("notesText").textContent = t("notesText");
  document.getElementById("languageSelect").value = lang;
  document.getElementById("orderSelect").value = rankOrder;
}

function render() {
  updateText();
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filter = document.getElementById("filter").value;
  buildGrid(q, filter);
  updateStats();
  updateSideLists();
}

function changeLang(value) {
  lang = value;
  saveSettings();
  render();
}

function changeOrder(value) {
  rankOrder = value;
  saveSettings();
  render();
}

function resetProgress() {
  if (!confirm(t("resetConfirm"))) return;
  cards = structuredClone(INITIAL_CARDS);
  save();
  render();
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  download("delta_asala_cards_backup.json", JSON.stringify(cards, null, 2), "application/json;charset=utf-8");
}

function exportCSV() {
  const headers = lang === "zh"
    ? "卡牌,英文名,花色,点数,数量,状态\n"
    : "Card,Chinese Name,Suit,Rank,Quantity,Status\n";
  let csv = headers;
  for (const c of cards) {
    const status = c.quantity > 1 ? t("duplicate") : c.quantity === 1 ? t("owned") : t("notOwned");
    if (lang === "zh") {
      csv += `"${c.zh}","${c.en}","${c.suitZh || ""}","${c.rankLabel}",${c.quantity},"${status}"\n`;
    } else {
      csv += `"${displayName(c)}","${c.zh}","${c.suitEn || ""}","${c.rankLabel}",${c.quantity},"${status}"\n`;
    }
  }
  download("delta_asala_cards_progress.csv", "\ufeff" + csv, "text/csv;charset=utf-8");
}

async function importJSON(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const imported = JSON.parse(text);
    if (!Array.isArray(imported)) throw new Error("invalid format");
    const byId = new Map(imported.map(card => [card.id, card]));
    cards = INITIAL_CARDS.map(baseCard => {
      const existing = byId.get(baseCard.id);
      return {
        ...baseCard,
        quantity: existing ? Math.max(0, parseInt(existing.quantity || "0", 10)) : 0
      };
    });
    if (!confirm(t("importConfirm"))) {
      cards = JSON.parse(localStorage.getItem(STORAGE_KEYS.cards) || "null") || structuredClone(INITIAL_CARDS);
      return;
    }
    save();
    render();
  } catch {
    alert(t("importFailed"));
  } finally {
    event.target.value = "";
  }
}

async function copyMissing() {
  const missing = orderedCardsForFlat("", "missing").map(c => displayName(c));
  const text = t("missingPrefix") + missing.join(lang === "zh" ? "、" : ", ");
  try {
    await navigator.clipboard.writeText(text);
    alert(t("copied"));
  } catch {
    prompt(t("promptCopy"), text);
  }
}

render();
</script>
</body>
</html>
