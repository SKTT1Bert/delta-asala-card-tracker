<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />

<title>Delta Force Asala Card Tracker | 三角洲阿萨拉牌盒记牌器</title>

<meta name="keywords" content="Delta Force, Delta Force Asala Card Tracker, Asala Card Tracker, Asala Card Case, 三角洲行动, 三角洲, 阿萨拉牌盒, 阿萨拉扑克牌, 三角洲记牌器, 三角洲牌盒收集, 扑克牌收集, card tracker, collection tracker, localStorage" />

<style>

  :root {
    --bg: #f5f5f7;
    --bg-2: #ffffff;
    --panel: rgba(255,255,255,.88);
    --panel-soft: rgba(255,255,255,.72);
    --line: rgba(15, 23, 42, .08);
    --line-soft: rgba(255,255,255,.72);
    --text: #1d1d1f;
    --muted: #6e6e73;
    --green: #34c759;
    --gold: #ffb340;
    --red: #ff5f57;
    --blue: #0071e3;
    --cyan: #64d2ff;
    --violet: #8e8cf0;
    --shadow: 0 10px 30px rgba(0,0,0,.06), 0 2px 10px rgba(0,0,0,.03);
    --shadow-soft: 0 8px 24px rgba(0,0,0,.05), 0 1px 4px rgba(0,0,0,.03);
    --shadow-inset: inset 0 1px 0 rgba(255,255,255,.78);
    --radius: 28px;
  }

  * { box-sizing: border-box; }
  html, body { overflow-x: hidden; }

  body {
    margin: 0;
    min-height: 100vh;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", "Microsoft YaHei", Arial, sans-serif;
    background:
      radial-gradient(circle at top, rgba(255,255,255,.95), transparent 28%),
      linear-gradient(180deg, #fbfbfd 0%, #f5f5f7 45%, #eff0f3 100%);
  }

  .wrap {
    width: min(1280px, 100%);
    margin: 0 auto;
    padding: 26px 18px 56px;
  }

  .panel {
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(255,255,255,.88), rgba(255,255,255,.72));
    border: 1px solid rgba(255,255,255,.72);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    min-width: 0;
  }

  .panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.38), rgba(255,255,255,0) 32%);
    pointer-events: none;
  }

  .hero {
    display: grid;
    grid-template-columns: minmax(0, 1.48fr) minmax(300px, .62fr);
    gap: 18px;
    align-items: stretch;
    margin-bottom: 18px;
  }

  .titlebox {
    padding: 34px 32px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background:
      radial-gradient(circle at 100% 0%, rgba(180, 214, 255, .22), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.76));
  }

  h1 {
    margin: 0 0 12px;
    font-size: clamp(32px, 3.4vw, 42px);
    letter-spacing: -.04em;
    font-weight: 700;
    line-height: 1.05;
  }

  .subtitle {
    color: var(--muted);
    line-height: 1.68;
    max-width: 760px;
    margin: 0;
    font-size: 19px;
    font-weight: 500;
  }

  .settings {
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-content: start;
    align-self: start;
    background:
      radial-gradient(circle at 100% 0%, rgba(190, 223, 255, .14), transparent 24%),
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(250,251,253,.84));
  }

  .settings-title {
    grid-column: 1 / -1;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
    padding: 2px 4px 10px;
  }

  .settings-title strong {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
  }

  .settings-title strong::before {
    content: "";
    display: inline-block;
    width: 38px;
    height: 10px;
    border-radius: 999px;
    background:
      radial-gradient(circle at 5px 5px, #ff5f57 0 4px, transparent 4.5px),
      radial-gradient(circle at 19px 5px, #ffbd2e 0 4px, transparent 4.5px),
      radial-gradient(circle at 33px 5px, #28c840 0 4px, transparent 4.5px);
    box-shadow: 0 1px 2px rgba(0,0,0,.08);
    flex: 0 0 auto;
  }

  .settings-title span {
    font-size: 12px;
    white-space: nowrap;
    opacity: .82;
  }

  .field {
    min-width: 0;
    display: grid;
    grid-template-columns: minmax(108px, 1fr) minmax(150px, 1.12fr);
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border-radius: 14px;
    border: 1px solid rgba(29,29,31,.06);
    background:
      linear-gradient(180deg, rgba(255,255,255,.86), rgba(247,248,251,.76));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,.82),
      0 2px 8px rgba(0,0,0,.025);
  }

  .field + .field {
    margin-top: 2px;
  }

  .field:hover {
    background:
      linear-gradient(180deg, rgba(255,255,255,.94), rgba(247,248,251,.84));
  }

  .field label {
    display: block;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 0;
    font-weight: 700;
    letter-spacing: .01em;
    line-height: 1.35;
    padding-left: 2px;
  }

  input, select, button {
    border: 1px solid rgba(29,29,31,.08);
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(246,247,250,.95));
    color: var(--text);
    border-radius: 18px;
    padding: 12px 15px;
    font: inherit;
    outline: none;
    min-width: 0;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.85), 0 2px 8px rgba(0,0,0,.03);
  }


  .field input,
  .field select {
    width: 100%;
    display: block;
  }

  .settings .field {
    max-width: 100%;
  }

  .settings .field select {
    justify-self: end;
    max-width: 100%;
  }

  .settings .field select,
  .settings .field input {
    border-radius: 12px;
    padding: 9px 12px;
    font-size: 14px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.88), 0 1px 4px rgba(0,0,0,.03);
  }

  input:focus, select:focus {
    border-color: rgba(0,113,227,.45);
    box-shadow: 0 0 0 4px rgba(0,113,227,.14), inset 0 1px 0 rgba(255,255,255,.9);
  }

  select, button { cursor: pointer; }
  button {
    user-select: none;
    transition: transform .15s ease, box-shadow .18s ease, filter .18s ease;
    white-space: nowrap;
    font-weight: 600;
  }
  button:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 18px rgba(0,0,0,.06);
  }
  button:active {
    transform: translateY(1px) scale(.99);
  }

  .primary {
    background: linear-gradient(180deg, #0a84ff, #0071e3);
    color: #fff;
    border-color: rgba(0,113,227,.14);
    box-shadow: 0 8px 18px rgba(0,113,227,.20), inset 0 1px 0 rgba(255,255,255,.18);
  }

  .danger {
    color: #c43d3d;
    border-color: rgba(255,95,87,.18);
    background: linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,244,244,.94));
  }

  .stats {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 14px;
    margin-bottom: 18px;
  }

  .stat {
    position: relative;
    min-width: 0;
    padding: 22px 22px 20px;
    border-radius: 28px;
    border: 1px solid rgba(255,255,255,.78);
    background:
      linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.72));
    box-shadow: var(--shadow-soft);
    overflow: hidden;
  }

  .stat::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.46), rgba(255,255,255,0) 42%);
    pointer-events: none;
  }

  .stat b {
    display: block;
    font-size: 44px;
    line-height: .95;
    margin-bottom: 10px;
    letter-spacing: -.05em;
    font-weight: 700;
  }

  .stat span {
    color: var(--muted);
    font-size: 13px;
    font-weight: 600;
  }

  .stats .stat:nth-child(1) b { color: #0071e3; }
  .stats .stat:nth-child(2) b { color: #8e8cf0; }
  .stats .stat:nth-child(3) b { color: #34c759; }
  .stats .stat:nth-child(4) b { color: #ff9f0a; }

  .progress {
    grid-column: 1 / -1;
    position: relative;
    background: rgba(255,255,255,.72);
    border: 1px solid rgba(255,255,255,.84);
    border-radius: 999px;
    height: 14px;
    overflow: hidden;
    box-shadow: inset 0 2px 4px rgba(0,0,0,.04);
  }

  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #30d158 0%, #64d2ff 55%, #0a84ff 100%);
    border-radius: 999px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    transition: width .2s ease;
  }

  .toolbar {
    display: grid;
    grid-template-columns: minmax(180px, 1fr) minmax(120px, 150px) repeat(5, auto);
    gap: 10px;
    align-items: center;
    padding: 16px;
    margin-bottom: 18px;
    background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.75));
  }

  .file-input { display: none; }

  .main {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(290px, 330px);
    gap: 18px;
    align-items: start;
  }

  .card-grid-panel {
    padding: 16px;
    overflow: hidden;
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.78));
  }

  .section-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin: 4px 4px 14px;
  }

  .section-title h2 {
    margin: 0;
    font-size: 22px;
    letter-spacing: -.03em;
    font-weight: 700;
  }

  .hint {
    color: var(--muted);
    font-size: 12px;
    font-weight: 600;
  }

  .flat-note {
    margin: 0 4px 12px;
    color: var(--muted);
    font-size: 13px;
    display: none;
  }

  .special-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .rank-row {
    display: grid;
    grid-template-columns: 64px repeat(4, minmax(0, 1fr));
    gap: 12px;
    margin-bottom: 12px;
    width: 100%;
  }

  .rank-label {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #8a6f2d;
    font-weight: 700;
    font-size: 28px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,.74);
    background: linear-gradient(180deg, rgba(255,250,238,.96), rgba(246,239,215,.92));
    box-shadow: var(--shadow-soft);
    min-height: 120px;
  }

  .flat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(min(100%, 198px), 1fr));
    gap: 12px;
    width: 100%;
  }

  .tile {
    min-height: 120px;
    min-width: 0;
    border: 1px solid rgba(255,255,255,.76);
    border-radius: 24px;
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(252,252,253,.76));
    padding: 13px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    position: relative;
    box-shadow: var(--shadow-soft);
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
    overflow: hidden;
  }

  .tile::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,0) 42%);
    pointer-events: none;
  }

  .tile:hover {
    transform: translateY(-2px);
    box-shadow: 0 14px 28px rgba(0,0,0,.07), 0 4px 10px rgba(0,0,0,.04);
  }

  .tile.owned {
    background: linear-gradient(180deg, rgba(245,255,249,.96), rgba(235,249,239,.92));
    border-color: rgba(210,243,221,.96);
  }

  .tile.duplicate {
    background: linear-gradient(180deg, rgba(255,252,244,.96), rgba(251,243,221,.92));
    border-color: rgba(247,231,182,.96);
  }

  .tile-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    min-width: 0;
  }

  .name {
    font-weight: 700;
    font-size: 16px;
    overflow-wrap: anywhere;
    min-width: 0;
    letter-spacing: -.02em;
  }

  .symbol {
    font-size: 27px;
    line-height: 1;
    font-weight: 900;
    opacity: .94;
    flex: 0 0 auto;
  }

  .symbol.red { color: #ff5f57; }
  .symbol.black { color: #58657d; }
  .symbol.joker { color: #ff9f0a; }
  .symbol.box { color: #0a84ff; font-size: 22px; }

  .qtyline {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    align-self: end;
    min-width: 0;
  }

  .qty-controls {
    display: grid;
    grid-template-columns: minmax(28px, 1fr) minmax(38px, 1.25fr) minmax(28px, 1fr);
    gap: 8px;
    align-items: center;
    width: 100%;
    min-width: 0;
  }

  .mini {
    width: 100%;
    height: 36px;
    padding: 0;
    border-radius: 14px;
    display: grid;
    place-items: center;
    font-weight: 800;
    font-size: 18px;
    line-height: 1;
  }

  .qty {
    width: 100%;
    height: 36px;
    text-align: center;
    padding: 0;
    border-radius: 14px;
    font-weight: 700;
  }

  .badge {
    justify-self: start;
    max-width: 100%;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid rgba(29,29,31,.06);
    color: var(--muted);
    white-space: nowrap;
    text-align: center;
    background: rgba(255,255,255,.78);
    box-shadow: 0 2px 8px rgba(0,0,0,.03);
    font-weight: 600;
  }

  .badge.ok {
    color: #248f4e;
    background: rgba(235,249,239,.95);
  }

  .badge.dup {
    color: #9b6d12;
    background: rgba(251,243,221,.95);
  }

  .side {
    display: grid;
    gap: 18px;
    min-width: 0;
  }

  .sidebox {
    padding: 18px;
    min-width: 0;
    background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(255,255,255,.76));
  }

  .sidebox h3 {
    margin: 0 0 12px;
    font-size: 18px;
    letter-spacing: -.02em;
    font-weight: 700;
  }

  .list {
    margin: 0;
    padding: 0;
    list-style: none;
    display: grid;
    gap: 8px;
    max-height: 340px;
    overflow: auto;
  }

  .list li {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    color: var(--text);
    border: 1px solid rgba(29,29,31,.05);
    border-radius: 16px;
    padding: 10px 12px;
    background: rgba(255,255,255,.78);
    box-shadow: 0 2px 8px rgba(0,0,0,.03);
    min-width: 0;
  }

  .list li span {
    min-width: 0;
    overflow-wrap: anywhere;
  }

  .list small {
    color: var(--muted);
    flex: 0 0 auto;
    font-weight: 700;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    line-height: 1.6;
  }

  .copy {
    width: 100%;
    margin-top: 10px;
  }


  @media (max-width: 1180px) {
    .hero {
      grid-template-columns: minmax(0, 1.32fr) minmax(300px, .74fr);
    }

    .field {
      grid-template-columns: 1fr;
      gap: 8px;
    }
  }

  @media (max-width: 1140px) {
    .toolbar {
      grid-template-columns: minmax(0, 1fr) minmax(120px, 150px) repeat(3, auto);
    }
  }

  @media (max-width: 1080px) {
    .hero, .main {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 820px) {
    .toolbar {
      grid-template-columns: 1fr 1fr;
    }

    .toolbar input {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 760px) {
    .wrap {
      padding: 14px 10px 34px;
    }

    .stats {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .field {
      grid-template-columns: 1fr;
      gap: 10px;
      padding: 13px;
    }

    .field label {
      font-size: 13px;
    }

    .stat b {
      font-size: 34px;
    }

    .special-grid {
      grid-template-columns: 1fr;
    }

    .rank-row {
      grid-template-columns: 52px repeat(2, minmax(0, 1fr));
    }

    .rank-label {
      grid-row: span 2;
      min-height: 252px;
      font-size: 22px;
    }

    .flat-grid {
      grid-template-columns: repeat(auto-fit, minmax(min(100%, 170px), 1fr));
    }
  }

  @media (max-width: 460px) {
    .settings,
    .stats,
    .toolbar {
      grid-template-columns: 1fr;
    }

    .rank-row {
      grid-template-columns: 44px 1fr;
    }

    .rank-label {
      grid-row: span 4;
      min-height: 500px;
    }
  }

    </aside>

</div>

let cards = JSON.parse(localStorage.getItem(STORAGE_KEYS.cards) || "null") || structuredClone(INITIAL_CARDS);
let lang = localStorage.getItem(STORAGE_KEYS.lang) || "zh";
let rankOrder = localStorage.getItem(STORAGE_KEYS.order) || "aceHigh";
let theme = localStorage.getItem(STORAGE_KEYS.theme) || "light";

function t(key) { return I18N[lang][key]; }
function save() { localStorage.setItem(STORAGE_KEYS.cards, JSON.stringify(cards)); }
function saveSettings() {
  localStorage.setItem(STORAGE_KEYS.lang, lang);
  localStorage.setItem(STORAGE_KEYS.order, rankOrder);
  localStorage.setItem(STORAGE_KEYS.theme, theme);
}

function applyTheme() {
  document.body.classList.toggle("dark-theme", theme === "dark");
}

function displayName(card) {
  if (lang === "zh") return card.zh;
  if (card.id === "case") return "Card Case";
  return card.en;
}

function cardById(id) { return cards.find(c => c.id === id); }
function cardBySuitRank(suitZh, rank) { return cards.find(c => c.suitZh === suitZh && c.rank === rank); }

function setQty(id, value) {
  const card = cardById(id);
  if (!card) return;
  card.quantity = Math.max(0, parseInt(value || "0", 10));
  save();
  render();
}

function inc(id, delta) {
  const card = cardById(id);
  if (!card) return;
  card.quantity = Math.max(0, Number(card.quantity || 0) + delta);
  save();
  render();
}

function cardTile(card) {
  const owned = card.quantity > 0;
  const duplicate = card.quantity > 1;
  const badge = duplicate
    ? `<span class="badge dup">${t("duplicate")} ×${card.quantity}</span>`
    : owned
      ? `<span class="badge ok">${t("owned")}</span>`
      : `<span class="badge">${t("notOwned")}</span>`;

  return `
    <div class="tile ${owned ? "owned" : ""} ${duplicate ? "duplicate" : ""}" data-id="${card.id}">
      <div class="tile-top">
        <div class="name">${displayName(card)}</div>
        <div class="symbol ${card.color}">${card.symbol}</div>
      </div>
      <div></div>
      <div class="qtyline">
        ${badge}
        <div class="qty-controls">
          <button class="mini" onclick="inc('${card.id}', -1)" aria-label="decrease">−</button>
          <input class="qty" value="${card.quantity}" inputmode="numeric" onchange="setQty('${card.id}', this.value)" aria-label="quantity" />
          <button class="mini" onclick="inc('${card.id}', 1)" aria-label="increase">+</button>
        </div>
      </div>
    </div>
  `;
}

function normalizedText(card) {
  return [card.zh, card.en, card.rank, card.suitZh, card.suitEn, displayName(card)]
    .join(" ")
    .toLowerCase();
}

function matches(card, q, filter) {
  const hit = !q || normalizedText(card).includes(q);
  if (!hit) return false;
  if (filter === "owned") return card.quantity > 0;
  if (filter === "missing") return card.quantity === 0;
  if (filter === "duplicate") return card.quantity > 1;
  return true;
}

function orderedCardsForFlat(q, filter) {
  const specialsFirst = [cardById("joker_big"), cardById("joker_small")].filter(Boolean);
  const suitOrder = ["黑桃", "红桃", "梅花", "方片"];
  const orderedRegular = [];
  for (const rank of RANK_ORDERS[rankOrder]) {
    for (const suitZh of suitOrder) {
      const c = cardBySuitRank(suitZh, rank);
      if (c) orderedRegular.push(c);
    }
  }
  const caseCard = cardById("case");
  return [...specialsFirst, ...orderedRegular, caseCard].filter(c => c && matches(c, q, filter));
}

function buildGrid(q, filter) {
  const area = document.getElementById("gridArea");
  const normalMode = !q && filter === "all";

  if (!normalMode) {
    const result = orderedCardsForFlat(q, filter);
    area.innerHTML = `<div class="flat-grid">${result.map(cardTile).join("") || '<div class="empty">' + t("noMatch") + '</div>'}</div>`;
    document.getElementById("flatNote").style.display = "block";
    return;
  }

  const specialHtml = `<div class="special-grid">${["joker_big", "joker_small", "case"].map(id => cardTile(cardById(id))).join("")}</div>`;
  const suitOrder = ["黑桃", "红桃", "梅花", "方片"];
  const rowsHtml = RANK_ORDERS[rankOrder].map(rank => {
    const rowCards = suitOrder.map(suitZh => cardBySuitRank(suitZh, rank));
    return `
      <div class="rank-row">
        <div class="rank-label">${rank}</div>
        ${rowCards.map(cardTile).join("")}
      </div>
    `;
  }).join("");
  area.innerHTML = specialHtml + rowsHtml;
  document.getElementById("flatNote").style.display = "none";
}

function updateStats() {
  const uniqueOwned = cards.filter(c => c.quantity > 0).length;
  const missing = 55 - uniqueOwned;
  const physical = cards.reduce((s, c) => s + Number(c.quantity || 0), 0);
  const dup = cards.reduce((s, c) => s + Math.max(0, Number(c.quantity || 0) - 1), 0);
  const pct = Math.round(uniqueOwned / 55 * 100);

  document.getElementById("uniqueOwned").textContent = uniqueOwned;
  document.getElementById("missingCount").textContent = missing;
  document.getElementById("physicalCount").textContent = physical;
  document.getElementById("dupCount").textContent = dup;
  document.getElementById("bar").style.width = pct + "%";
}

function updateSideLists() {
  const dupList = document.getElementById("dupList");
  const dupCards = cards.filter(c => c.quantity > 1);
  dupList.innerHTML = dupCards.map(c => `<li><span>${displayName(c)}</span><small>×${c.quantity}</small></li>`).join("");
  document.getElementById("dupEmpty").style.display = dupCards.length ? "none" : "block";

  const missingList = document.getElementById("missingList");
  const missing = orderedCardsForFlat("", "missing");
  missingList.innerHTML = missing.map(c => `<li><span>${displayName(c)}</span><small>${t("miss")}</small></li>`).join("");
}

function updateText() {
  document.documentElement.lang = I18N[lang].htmlLang;
  document.title = t("appTitle");
  document.getElementById("appTitle").textContent = t("appTitle");
  document.getElementById("subtitle").textContent = t("subtitle");
  document.getElementById("settingsTitle").textContent = t("settings");
  document.getElementById("languageLabel").textContent = t("language");
  document.getElementById("orderLabel").textContent = t("order");
  document.getElementById("themeLabel").textContent = t("theme");
  document.getElementById("uniqueLabel").textContent = t("unique");
  document.getElementById("missingLabel").textContent = t("missing");
  document.getElementById("physicalLabel").textContent = t("physical");
  document.getElementById("dupLabel").textContent = t("duplicateCount");
  document.getElementById("search").placeholder = t("searchPlaceholder");
  const filter = document.getElementById("filter");
  filter.options[0].textContent = t("filterAll");
  filter.options[1].textContent = t("filterOwned");
  filter.options[2].textContent = t("filterMissing");
  filter.options[3].textContent = t("filterDuplicate");
  document.getElementById("exportJsonBtn").textContent = t("exportJson");
  document.getElementById("exportCsvBtn").textContent = t("exportCsv");
  document.getElementById("importBtn").textContent = t("importJson");
  document.getElementById("copyMissingBtn").textContent = t("copyMissing");
  document.getElementById("resetBtn").textContent = t("reset");
  document.getElementById("gridTitle").textContent = t("grid");
  document.getElementById("legendText").textContent = t("legend");
  document.getElementById("flatNote").textContent = t("flatNote");
  document.getElementById("duplicatesTitle").textContent = t("duplicateCards");
  document.getElementById("dupEmpty").textContent = t("noDuplicate");
  document.getElementById("missingTitle").textContent = t("missingCards");
  document.getElementById("copyMissingBtn2").textContent = t("copyMissing");
  document.getElementById("notesTitle").textContent = t("notes");
  document.getElementById("notesText").textContent = t("notesText");
  document.getElementById("languageSelect").value = lang;
  document.getElementById("orderSelect").value = rankOrder;
  const themeSelect = document.getElementById("themeSelect");
  themeSelect.options[0].textContent = t("themeLight");
  themeSelect.options[1].textContent = t("themeDark");
  themeSelect.value = theme;
}

function render() {
  applyTheme();
  updateText();
  const q = document.getElementById("search").value.trim().toLowerCase();
  const filter = document.getElementById("filter").value;
  buildGrid(q, filter);
  updateStats();
  updateSideLists();
}

function changeLang(value) {
  lang = value;
  saveSettings();
  render();
}

function changeOrder(value) {
  rankOrder = value;
  saveSettings();
  render();
}

function changeTheme(value) {
  theme = value;
  saveSettings();
  render();
}

function resetProgress() {
  if (!confirm(t("resetConfirm"))) return;
  cards = structuredClone(INITIAL_CARDS);
  save();
  render();
}

function download(filename, content, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportJSON() {
  download("delta_asala_cards_backup.json", JSON.stringify(cards, null, 2), "application/json;charset=utf-8");
}

function exportCSV() {
  const headers = lang === "zh"
    ? "卡牌,英文名,花色,点数,数量,状态\n"
    : "Card,Chinese Name,Suit,Rank,Quantity,Status\n";
  let csv = headers;
  for (const c of cards) {
    const status = c.quantity > 1 ? t("duplicate") : c.quantity === 1 ? t("owned") : t("notOwned");
    if (lang === "zh") {
      csv += `"${c.zh}","${c.en}","${c.suitZh || ""}","${c.rankLabel}",${c.quantity},"${status}"\n`;
    } else {
      csv += `"${displayName(c)}","${c.zh}","${c.suitEn || ""}","${c.rankLabel}",${c.quantity},"${status}"\n`;
    }
  }
  download("delta_asala_cards_progress.csv", "\ufeff" + csv, "text/csv;charset=utf-8");
}

async function importJSON(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const imported = JSON.parse(text);
    if (!Array.isArray(imported)) throw new Error("invalid format");
    const byId = new Map(imported.map(card => [card.id, card]));
    cards = INITIAL_CARDS.map(baseCard => {
      const existing = byId.get(baseCard.id);
      return {
        ...baseCard,
        quantity: existing ? Math.max(0, parseInt(existing.quantity || "0", 10)) : 0
      };
    });
    if (!confirm(t("importConfirm"))) {
      cards = JSON.parse(localStorage.getItem(STORAGE_KEYS.cards) || "null") || structuredClone(INITIAL_CARDS);
      return;
    }
    save();
    render();
  } catch {
    alert(t("importFailed"));
  } finally {
    event.target.value = "";
  }
}

async function copyMissing() {
  const missing = orderedCardsForFlat("", "missing").map(c => displayName(c));
  const text = t("missingPrefix") + missing.join(lang === "zh" ? "、" : ", ");
  try {
    await navigator.clipboard.writeText(text);
    alert(t("copied"));
  } catch {
    prompt(t("promptCopy"), text);
  }
}

applyTheme();
render();
</script>
